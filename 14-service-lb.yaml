apiVersion: v1
kind: Service
metadata:
  name: nginxlbservice
  labels:
    project: roboshop
    environment: dev
spec:
  type: LoadBalancer
  selector:
    project: roboshop
    tier: frontend
    component: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30008

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    project: roboshop
    tier: frontend
    component: frontend
spec:
  containers:
    - name: nginx
      image: nginx
