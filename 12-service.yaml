apiVersion: v1
kind: Service
metadata:
  name: nginxservice
  #Service labels
  labels:
    project: roboshop
    environment: dev
spec:
  #Service uses these below labels to select the pod
  selector:
    project: roboshop
    tier: frontend
    component: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    project: roboshop
    tier: frontend
    component: frontend
spec:
  containers:
    - name: nginx
      image: nginx
