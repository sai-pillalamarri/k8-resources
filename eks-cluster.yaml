apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: roboshop-dev
  region: us-east-1

managedNodeGroups:
  - name: roboshop-dev-managed
    instanceTypes:
      [
        "c5a.large",
        "c5n.large",
        "c5d.large",
        "c5.large",
        "c4.large",
        "c3.large",
      ]
    spot: true
    desiredCapacity: 2
    minSize: 1
    maxSize: 4
