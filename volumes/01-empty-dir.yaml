apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - mountPath: /var/log/nginx
          name: nginx-logs
    - name: almalinu
      image: almalinux:9
      command: ["sleep", "1000"]
      volumeMounts:
        - mountPath: /mnt/nginx-logs
          name: nginx-logs
          readOnly: true

  volumes:
    - name: nginx-logs
      emptyDir:
        sizeLimit: 500Mi
